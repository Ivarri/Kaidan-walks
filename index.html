<div id="root"></div>
<script>
const { useState, useEffect, useRef, useCallback } = React;

const COLORS = { easy:"#4a6741", medium:"#c4622d", hard:"#c62828" };
const LABELS  = { easy:"Fácil", medium:"Media", hard:"Difícil" };
const BADGE   = { easy:{bg:"#e8f5e9",color:"#2e7d32"}, medium:{bg:"#fff3e0",color:"#e65100"}, hard:{bg:"#fce4ec",color:"#c62828"} };
const V = { bark:"#3b2a1a", cream:"#faf6ee", sand:"#e8dcc8", sandDeep:"#c8b89a", accent:"#c4622d", moss:"#4a6741" };

function calcKm(pts) {
  if (!pts||pts.length<2) return 0;
  let d=0;
  for (let i=1;i<pts.length;i++) {
    const R=6371,dLat=((pts[i][0]-pts[i-1][0])*Math.PI)/180,dLon=((pts[i][1]-pts[i-1][1])*Math.PI)/180;
    const a=Math.sin(dLat/2)**2+Math.cos(pts[i-1][0]*Math.PI/180)*Math.cos(pts[i][0]*Math.PI/180)*Math.sin(dLon/2)**2;
    d+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  return d;
}

function fmtTime(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

function App() {
  const mapRef=useRef(null), mRef=useRef(null);
  const toolRef=useRef("view"), drawLineRef=useRef(null);
  const drawDotsRef=useRef([]), routeLayersRef=useRef([]), stRef=useRef(null);
  const watchRef=useRef(null), liveLineRef=useRef(null), liveMarkerRef=useRef(null), timerRef=useRef(null);
  const livePtsRef=useRef([]);

  const [tool,setToolState]=useState("view");
  const [drawPts,setDrawPts]=useState([]);
  const [panel,setPanel]=useState(null);
  const [tab,setTab]=useState("routes");
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({name:"",diff:"easy",mins:"30"});
  const [routes,setRoutes]=useState(()=>{ try{return JSON.parse(localStorage.getItem("kw")||"[]");}catch(e){return[];} });
  const [activeIdx,setActiveIdx]=useState(-1);
  const [toast,setToast]=useState("");
  const [search,setSearch]=useState("");
  const [sugg,setSugg]=useState([]);
  const [welcome,setWelcome]=useState(()=>!localStorage.getItem("kw-ok"));
  const [tracking,setTracking]=useState(false);
  const [livePts,setLivePts]=useState([]);
  const [liveKm,setLiveKm]=useState(0);
  const [liveSecs,setLiveSecs]=useState(0);
  const [mapReady,setMapReady]=useState(false);

  const showToast=useCallback((msg)=>{setToast(msg);setTimeout(()=>setToast(""),3500);},[]);

  // Init map
  useEffect(()=>{
    if (!mapRef.current||mRef.current) return;
    const L=window.L;
    const el=mapRef.current;
    el.style.width=window.innerWidth+"px";
    el.style.height=window.innerHeight+"px";

    const m=L.map(el,{zoomControl:false}).setView([39.5696,2.6502],13);

    const urls=[
      "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      "https://a.tile.openstreetmap.de/{z}/{x}/{y}.png"
    ];
    let ti=0,layer;
    function nt(){
      if(ti>=urls.length)return;
      if(layer)try{m.removeLayer(layer);}catch(e){}
      layer=L.tileLayer(urls[ti++],{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(m);
      layer.once("tileerror",()=>setTimeout(nt,400));
    }
    nt();

    L.control.zoom({position:"bottomright"}).addTo(m);
    m.on("click",(e)=>{
      if(toolRef.current==="draw"){
        const ll=[e.latlng.lat,e.latlng.lng];
        setDrawPts(prev=>{const next=[...prev,ll];reDraw(m,next);return next;});
      }
    });
    mRef.current=m;
    setMapReady(true);

    // Auto-locate with delay to ensure map + permissions are ready
    setTimeout(()=>doLocate(m),1200);

    // Paint saved routes
    try{
      const saved=JSON.parse(localStorage.getItem("kw")||"[]");
      saved.forEach((r,i)=>paintRoute(r,i,m));
    }catch(e){}

    const onResize=()=>{
      el.style.width=window.innerWidth+"px";
      el.style.height=window.innerHeight+"px";
      m.invalidateSize();
    };
    window.addEventListener("resize",onResize);
    setTimeout(()=>m.invalidateSize(),100);
    return ()=>window.removeEventListener("resize",onResize);
  },[]);



  function reDraw(m,pts){
    const L=window.L;
    drawDotsRef.current.forEach(d=>{try{m.removeLayer(d);}catch(e){}});drawDotsRef.current=[];
    if(drawLineRef.current){try{m.removeLayer(drawLineRef.current);}catch(e){}drawLineRef.current=null;}
    pts.forEach(p=>{const d=L.circleMarker(p,{radius:5,color:"#c4622d",fillColor:"#e8855a",fillOpacity:1,weight:2}).addTo(m);drawDotsRef.current.push(d);});
    if(pts.length>1)drawLineRef.current=L.polyline(pts,{color:"#c4622d",weight:4,opacity:.85,dashArray:"8 4"}).addTo(m);
  }

  function setTool(t){
    toolRef.current=t; setToolState(t);
    if(mRef.current)mRef.current.getContainer().style.cursor=t==="view"?"":"crosshair";
    if(t==="draw")showToast("Toca el mapa para trazar ✏️");
  }

  function cancelDraw(){
    if(mRef.current)reDraw(mRef.current,[]);
    setDrawPts([]); toolRef.current="view"; setToolState("view");
  }

  // Locate helper — used by auto-locate and button
  function doLocate(mapObj){
    const m = mapObj || mRef.current;
    const L = window.L;
    if(!m||!L){return;}
    if(!navigator.geolocation){showToast("GPS no disponible en este navegador");return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const la=pos.coords.latitude, lo=pos.coords.longitude;
        m.setView([la,lo],16);
        const icon=L.divIcon({
          html:'<div style="width:22px;height:22px;background:#7BA7BC;border:3px solid white;border-radius:50%;box-shadow:0 0 0 7px rgba(123,167,188,0.3)"></div>',
          className:"",iconSize:[22,22],iconAnchor:[11,11]
        });
        L.marker([la,lo],{icon}).addTo(m).bindPopup("📍 Estás aquí con Kaidan");
        showToast("📍 Ubicación encontrada");
      },
      err=>{
        const msgs={1:"Activa el GPS en Ajustes > Apps > Documents > Ubicación",2:"Señal GPS débil, inténtalo fuera",3:"Tiempo agotado, pulsa el botón 📍 de nuevo"};
        showToast(msgs[err.code]||"No se pudo obtener la ubicación");
      },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  }

  // Live tracking
  function startTracking(){
    if(!navigator.geolocation){showToast("GPS no disponible. Usa el modo Dibujar.");return;}
    setTracking(true);setLivePts([]);setLiveKm(0);setLiveSecs(0);livePtsRef.current=[];
    timerRef.current=setInterval(()=>setLiveSecs(s=>s+1),1000);
    watchRef.current=navigator.geolocation.watchPosition(pos=>{
      const ll=[pos.coords.latitude,pos.coords.longitude];
      const m=mRef.current,L=window.L;if(!m||!L)return;
      livePtsRef.current=[...livePtsRef.current,ll];
      const pts=livePtsRef.current;
      setLivePts([...pts]);setLiveKm(calcKm(pts));
      if(liveLineRef.current)try{m.removeLayer(liveLineRef.current);}catch(e){}
      if(pts.length>1)liveLineRef.current=L.polyline(pts,{color:"#7BA7BC",weight:5,opacity:.9}).addTo(m);
      if(liveMarkerRef.current)try{m.removeLayer(liveMarkerRef.current);}catch(e){}
      const icon=L.divIcon({html:'<div style="width:20px;height:20px;background:#7BA7BC;border:3px solid white;border-radius:50%;box-shadow:0 0 0 6px rgba(123,167,188,0.3)"></div>',className:"",iconSize:[20,20],iconAnchor:[10,10]});
      liveMarkerRef.current=L.marker(ll,{icon}).addTo(m);
      m.setView(ll,16);
    },err=>{
      stopTracking();
      showToast(err.code===1?"GPS denegado. Actívalo en Ajustes > Safari > Ubicación.":"Error de GPS. Inténtalo de nuevo.");
    },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
    showToast("📡 Grabando ruta en vivo…");
  }

  function stopTracking(){
    if(watchRef.current!=null){navigator.geolocation.clearWatch(watchRef.current);watchRef.current=null;}
    clearInterval(timerRef.current);setTracking(false);
  }

  function clearLiveLayer(){
    const m=mRef.current;if(!m)return;
    if(liveLineRef.current)try{m.removeLayer(liveLineRef.current);liveLineRef.current=null;}catch(e){}
    if(liveMarkerRef.current)try{m.removeLayer(liveMarkerRef.current);liveMarkerRef.current=null;}catch(e){}
  }

  function finishTracking(){
    stopTracking();
    const pts=livePtsRef.current;
    if(pts.length<2){showToast("Ruta demasiado corta");clearLiveLayer();return;}
    setDrawPts(pts);if(mRef.current)reDraw(mRef.current,pts);clearLiveLayer();
    setForm({name:"",diff:"easy",mins:String(Math.round(calcKm(pts)*15))});setSaving(true);
  }

  function cancelTracking(){stopTracking();clearLiveLayer();setLivePts([]);showToast("Grabación cancelada");}

  function openSave(){
    if(drawPts.length<2){showToast("Añade al menos 2 puntos");return;}
    setForm({name:"",diff:"easy",mins:String(Math.round(calcKm(drawPts)*15))});setSaving(true);
  }

  function doSave(){
    const km=+calcKm(drawPts).toFixed(2);
    const r={id:Date.now(),name:form.name||"Mi ruta",diff:form.diff,mins:parseInt(form.mins)||30,km,pts:drawPts,date:new Date().toLocaleDateString("es-ES")};
    const next=[...routes,r];setRoutes(next);
    localStorage.setItem("kw",JSON.stringify(next));
    paintRoute(r,next.length-1,mRef.current);
    setSaving(false);cancelDraw();setLivePts([]);livePtsRef.current=[];
    showToast('¡"'+r.name+'" guardada! 🐾');
  }

  function paintRoute(r,idx,m){
    if(!m||!r.pts||r.pts.length<2)return;
    const L=window.L;
    const lls=r.pts.map(p=>L.latLng(p[0],p[1]));
    const poly=L.polyline(lls,{color:COLORS[r.diff]||"#4a6741",weight:4,opacity:.85}).addTo(m)
      .bindPopup("<b>"+r.name+"</b><br><small>📏 "+r.km+" km · ⏱ "+r.mins+" min</small>");
    const di=(c)=>L.divIcon({html:'<div style="width:10px;height:10px;background:'+c+';border:2px solid #fff;border-radius:50%"></div>',className:"",iconSize:[10,10],iconAnchor:[5,5]});
    routeLayersRef.current.push({poly,sm:L.marker(lls[0],{icon:di("#4a6741")}).addTo(m),em:L.marker(lls[lls.length-1],{icon:di("#c4622d")}).addTo(m)});
  }

  function deleteRoute(i){
    if(!confirm('¿Eliminar "'+routes[i].name+'"?'))return;
    const next=routes.filter((_,idx)=>idx!==i);setRoutes(next);
    localStorage.setItem("kw",JSON.stringify(next));
    const m=mRef.current;
    routeLayersRef.current.forEach(l=>{try{m.removeLayer(l.poly);m.removeLayer(l.sm);m.removeLayer(l.em);}catch(e){}});
    routeLayersRef.current=[];next.forEach((r,i)=>paintRoute(r,i,m));setActiveIdx(-1);showToast("Ruta eliminada");
  }

  function zoomRoute(i){
    const m=mRef.current,L=window.L;if(!m||!L||!routes[i])return;
    const lls=routes[i].pts.map(p=>L.latLng(p[0],p[1]));
    if(lls.length)m.fitBounds(L.latLngBounds(lls),{padding:[60,60]});setPanel(null);
  }

  // Search
  useEffect(()=>{
    if(search.length<3){setSugg([]);return;}
    clearTimeout(stRef.current);
    stRef.current=setTimeout(async()=>{
      try{
        const res=await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(search)+"&format=json&limit=5&accept-language=es");
        const data=await res.json();
        setSugg(data.map(p=>({label:p.display_name.split(",").slice(0,3).join(", "),lat:+p.lat,lon:+p.lon})));
      }catch(e){}
    },350);
  },[search]);

  function goTo(s){
    if(mRef.current)mRef.current.setView([s.lat,s.lon],15);
    setSearch(s.label.split(",")[0]);setSugg([]);showToast("📍 "+s.label.split(",")[0]);
  }

  const km=calcKm(drawPts),totalKm=routes.reduce((s,r)=>s+r.km,0),isDrawing=drawPts.length>0&&!tracking;

  return React.createElement("div",{style:{width:"100%",height:"100vh",position:"relative",overflow:"hidden",background:V.bark}},

    // MAP
    React.createElement("div",{ref:mapRef,style:{position:"absolute",top:0,left:0,zIndex:1}}),

    // TOP BAR
    React.createElement("div",{style:{position:"absolute",top:0,left:0,right:0,height:52,background:"rgba(42,28,16,0.93)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",padding:"0 10px",gap:6,zIndex:100}},
      React.createElement("span",{style:{fontSize:20}},"🐾"),
      React.createElement("span",{style:{color:V.sand,fontWeight:700,fontSize:16,flex:1}},"Kaidan Walks"),
      React.createElement("button",{onClick:()=>{setPanel(p=>p?null:"routes");setTab("routes");},style:{padding:"6px 10px",background:"rgba(255,255,255,0.15)",color:V.sand,border:"none",borderRadius:13,fontSize:12,fontWeight:600,cursor:"pointer"}},"📋 Rutas"),
      React.createElement("button",{onClick:()=>doLocate(),style:{padding:"6px 10px",background:"rgba(123,167,188,0.35)",color:"white",border:"none",borderRadius:13,fontSize:12,fontWeight:600,cursor:"pointer"}},"📍 Ir a mi posición"),
      !tracking&&React.createElement("button",{onClick:()=>{setTool("draw");setPanel(null);},style:{padding:"6px 10px",background:V.accent,color:"white",border:"none",borderRadius:13,fontSize:12,fontWeight:600,cursor:"pointer"}},"✏️ Dibujar"),
      !isDrawing&&React.createElement("button",{onClick:tracking?finishTracking:startTracking,style:{padding:"6px 10px",background:tracking?"#4a6741":"#5b8fa8",color:"white",border:"none",borderRadius:13,fontSize:12,fontWeight:600,cursor:"pointer"}},tracking?"⏹ Guardar":"📡 Grabar"),
      tracking&&React.createElement("button",{onClick:cancelTracking,style:{padding:"6px 10px",background:"rgba(255,255,255,0.12)",color:V.sandDeep,border:"none",borderRadius:13,fontSize:12,cursor:"pointer"}},"✕")
    ),

    // SEARCH
    !tracking&&React.createElement("div",{style:{position:"absolute",top:60,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 20px)",maxWidth:400,zIndex:100}},
      React.createElement("div",{style:{display:"flex",background:"white",borderRadius:22,boxShadow:"0 4px 20px rgba(0,0,0,0.3)",overflow:"hidden"}},
        React.createElement("input",{value:search,onChange:e=>setSearch(e.target.value),onKeyDown:e=>e.key==="Enter"&&sugg.length&&goTo(sugg[0]),placeholder:"Busca tu barrio o ciudad...",style:{flex:1,border:"none",outline:"none",padding:"10px 13px",fontSize:13,color:V.bark,minWidth:0,fontFamily:"inherit"}}),
        React.createElement("button",{onClick:()=>sugg.length&&goTo(sugg[0]),style:{background:V.accent,border:"none",padding:"0 13px",color:"white",fontSize:16,cursor:"pointer"}},"🔍")
      ),
      sugg.length>0&&React.createElement("div",{style:{background:"white",borderRadius:12,marginTop:4,boxShadow:"0 6px 24px rgba(0,0,0,0.2)",overflow:"hidden"}},
        sugg.map((s,i)=>React.createElement("div",{key:i,onClick:()=>goTo(s),style:{padding:"10px 13px",fontSize:13,cursor:"pointer",borderBottom:i<sugg.length-1?"1px solid "+V.sand:"none",color:V.bark}},s.label))
      )
    ),

    // LIVE HUD
    tracking&&React.createElement("div",{style:{position:"absolute",top:60,left:"50%",transform:"translateX(-50%)",zIndex:100,background:"rgba(42,28,16,0.95)",borderRadius:20,padding:"12px 20px",display:"flex",alignItems:"center",gap:16,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}},
      React.createElement("div",{style:{textAlign:"center"}},React.createElement("div",{style:{fontSize:22,fontWeight:700,color:"#7BA7BC"}},liveKm.toFixed(2)),React.createElement("div",{style:{fontSize:10,color:V.sandDeep,textTransform:"uppercase"}},"km")),
      React.createElement("div",{style:{width:1,height:32,background:"rgba(255,255,255,0.15)"}}),
      React.createElement("div",{style:{textAlign:"center"}},React.createElement("div",{style:{fontSize:22,fontWeight:700,color:V.sand}},fmtTime(liveSecs)),React.createElement("div",{style:{fontSize:10,color:V.sandDeep,textTransform:"uppercase"}},"tiempo")),
      React.createElement("div",{style:{width:1,height:32,background:"rgba(255,255,255,0.15)"}}),
      React.createElement("div",{style:{textAlign:"center"}},React.createElement("div",{style:{fontSize:22,fontWeight:700,color:V.sand}},livePts.length),React.createElement("div",{style:{fontSize:10,color:V.sandDeep,textTransform:"uppercase"}},"puntos")),
      React.createElement("div",{style:{width:10,height:10,background:"#7BA7BC",borderRadius:"50%",marginLeft:4,boxShadow:"0 0 0 4px rgba(123,167,188,0.3)"}})
    ),

    // TOOL BAR
    !tracking&&React.createElement("div",{style:{position:"absolute",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:100,background:"rgba(42,28,16,0.92)",borderRadius:24,display:"flex",gap:3,padding:5,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}},
      [["view","👁 Ver"],["draw","✏️ Dibujar"],["pin","📍 Marcar"]].map(([t,label])=>
        React.createElement("button",{key:t,onClick:()=>setTool(t),style:{padding:"7px 12px",border:"none",borderRadius:18,fontSize:12,fontWeight:600,cursor:"pointer",background:tool===t?V.accent:"transparent",color:tool===t?"white":V.sandDeep,fontFamily:"inherit"}},label)
      )
    ),

    // DRAW STATUS
    isDrawing&&React.createElement("div",{style:{position:"absolute",bottom:76,left:"50%",transform:"translateX(-50%)",zIndex:100,background:"rgba(42,28,16,0.95)",borderRadius:20,padding:"8px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 16px rgba(0,0,0,.4)",whiteSpace:"nowrap"}},
      React.createElement("span",{style:{fontSize:16,fontWeight:700,color:"#e8855a"}},km.toFixed(2)+" km"),
      React.createElement("span",{style:{fontSize:12,color:V.sandDeep}},drawPts.length+" pts"),
      React.createElement("button",{onClick:openSave,style:{padding:"5px 12px",background:V.moss,color:"white",border:"none",borderRadius:13,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},"Guardar ✓"),
      React.createElement("button",{onClick:cancelDraw,style:{padding:"5px 9px",background:"rgba(255,255,255,0.1)",color:V.sandDeep,border:"none",borderRadius:13,fontSize:12,cursor:"pointer",fontFamily:"inherit"}},"✕")
    ),

    // SIDE PANEL
    React.createElement("div",{style:{position:"absolute",top:0,right:panel?0:-310,bottom:0,width:290,background:"white",zIndex:200,transition:"right 0.3s ease",boxShadow:"-4px 0 20px rgba(0,0,0,0.25)",display:"flex",flexDirection:"column"}},
      React.createElement("div",{style:{background:V.bark,padding:13,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
        React.createElement("span",{style:{color:V.sand,fontWeight:700,fontSize:15}},"🐾 Kaidan Walks"),
        React.createElement("button",{onClick:()=>setPanel(null),style:{background:"rgba(255,255,255,.15)",border:"none",color:V.sand,width:26,height:26,borderRadius:"50%",fontSize:14,cursor:"pointer"}},"✕")
      ),
      React.createElement("div",{style:{display:"flex",borderBottom:"1px solid "+V.sand,flexShrink:0}},
        [["routes","🗺 Rutas"],["stats","📊 Stats"],["tips","💡 Tips"]].map(([t,label])=>
          React.createElement("div",{key:t,onClick:()=>setTab(t),style:{flex:1,padding:"10px 4px",textAlign:"center",fontSize:11,fontWeight:600,textTransform:"uppercase",cursor:"pointer",color:tab===t?V.accent:V.sandDeep,borderBottom:"2px solid "+(tab===t?V.accent:"transparent")}},label)
        )
      ),
      React.createElement("div",{style:{flex:1,overflowY:"auto"}},
        tab==="routes"&&(routes.length===0
          ?React.createElement("div",{style:{textAlign:"center",padding:"40px 20px",color:V.sandDeep}},React.createElement("div",{style:{fontSize:44,marginBottom:10}},"🗺️"),React.createElement("p",{style:{fontSize:13,lineHeight:1.6}},"Sin rutas aún.",React.createElement("br"),"¡Graba o dibuja la primera!"))
          :routes.map((r,i)=>React.createElement("div",{key:r.id,onClick:()=>{setActiveIdx(i);zoomRoute(i);},style:{padding:"12px 13px",borderBottom:"1px solid "+V.sand,cursor:"pointer",background:activeIdx===i?"#fdf3ec":"white"}},
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}},
              React.createElement("span",{style:{fontWeight:600,fontSize:14,color:V.bark}},r.name),
              React.createElement("span",{style:{fontSize:10,padding:"2px 7px",borderRadius:9,fontWeight:600,background:BADGE[r.diff].bg,color:BADGE[r.diff].color}},LABELS[r.diff])
            ),

              React.createElement("span",null,"📏 "+r.km+" km"),React.createElement("span",null,"⏱ "+r.mins+" min"),React.createElement("span",null,"📅 "+r.date)
